<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BodyVision HUD - Real-Time Tracking System</title>
  <style>
    body { margin:0; overflow:hidden; background:#000; font-family:Arial; }
    #container { position:relative; width:100vw; height:100vh; }
    canvas { display:block; }
    .label { position:absolute; background:rgba(0,0,0,0.75); color:#0ff; padding:4px 8px; border-radius:4px; font-size:12px; pointer-events:none; white-space:nowrap; box-shadow:0 0 10px #0ff; }
  </style>
</head>
<body>
<div id="container">
  <video id="video" autoplay playsinline style="display:none"></video>
  <canvas id="three"></canvas>
</div>

<script type="module">
import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js';

// ============== MEDIA PIPE SETUP ==============
let poseLandmarker, faceLandmarker, video, canvas, ctx, scene, camera, renderer;
let labels = {}; // DOM labels attached to parts

const POSE_CONNECTIONS = [[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,25],[24,26],[25,27],[26,28],[27,31],[28,32]]; // simplified skeleton

async function initMediaPipe() {
  const vision = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs');
  const { FilesetResolver, PoseLandmarker, FaceLandmarker } = vision;

  const fileset = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
  );

  poseLandmarker = await PoseLandmarker.createFromOptions(fileset, {
    baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task" },
    runningMode: "VIDEO",
    numPoses: 3
  });

  faceLandmarker = await FaceLandmarker.createFromOptions(fileset, {
    baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker.task" },
    runningMode: "VIDEO",
    numFaces: 3,
    outputFaceBlendshapes: true
  });
}

// ============== THREE.JS + VIDEO BACKGROUND ==============
function initThree() {
  canvas = document.getElementById('three');
  renderer = new THREE.WebGLRenderer({ canvas, alpha: false });
  renderer.setSize(window.innerWidth, window.innerHeight);

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 3;

  // Video texture plane
  const videoTexture = new THREE.VideoTexture(video);
  const plane = new THREE.Mesh(
    new THREE.PlaneGeometry(4, 3),
    new THREE.MeshBasicMaterial({ map: videoTexture, side: THREE.DoubleSide })
  );
  scene.add(plane);
}

// ============== HELPER: CALCULATE ANGLE ==============
function calculateAngle(a, b, c) {
  const ba = new THREE.Vector3().subVectors(a, b);
  const bc = new THREE.Vector3().subVectors(c, b);
  return Math.acos(ba.dot(bc) / (ba.length() * bc.length())) * (180 / Math.PI);
}

// ============== ACTIVITY INFERENCE ==============
function getActivity(poseLandmarks) {
  if (!poseLandmarks) return "Unknown";
  const leftHip = poseLandmarks[23];
  const leftKnee = poseLandmarks[25];
  const leftAnkle = poseLandmarks[27];
  const kneeAngle = calculateAngle(leftHip, leftKnee, leftAnkle);

  const leftWristY = poseLandmarks[15]?.y || 1;
  const leftShoulderY = poseLandmarks[11]?.y || 1;

  if (kneeAngle < 130) return "Sitting";
  if (leftWristY < leftShoulderY - 0.2) return "Waving / Raising hand";
  return "Standing";
}

// ============== MAIN LOOP ==============
let lastVideoTime = -1;
async function loop() {
  if (video.currentTime !== lastVideoTime) {
    const now = performance.now();

    const poseResults = poseLandmarker.detectForVideo(video, now);
    const faceResults = faceLandmarker.detectForVideo(video, now);

    // Clear previous labels
    Object.values(labels).forEach(l => l.style.opacity = '0');

    // Process every detected person
    if (poseResults.landmarks) {
      poseResults.landmarks.forEach((pose, personIdx) => {
        const activity = getActivity(pose);
        const headPos = {x: pose[0].x * canvas.width, y: pose[0].y * canvas.height};

        // Activity label above head
        let actLabel = labels[`act${personIdx}`] || createLabel(`Activity: ${activity}`, headPos.x, headPos.y - 60, '#0f0');
        actLabel.textContent = `Activity: ${activity}`;
        actLabel.style.opacity = '1';
        labels[`act${personIdx}`] = actLabel;

        // Example stats on specific parts
        // Left eye (approximate from face + pose)
        if (faceResults.faceBlendshapes && faceResults.faceBlendshapes[personIdx]) {
          const bs = faceResults.faceBlendshapes[personIdx];
          const eyeBlink = bs.find(b => b.categoryName === 'eyeBlinkLeft')?.score || 0;
          const jawOpen = bs.find(b => b.categoryName === 'jawOpen')?.score || 0;

          const eyeLabel = labels[`eyeL${personIdx}`] || createLabel("", pose[1].x*canvas.width, pose[1].y*canvas.height - 30);
          eyeLabel.textContent = `Eye: ${eyeBlink > 0.5 ? 'Closed' : 'Open'} | Gaze tracked`;
          eyeLabel.style.opacity = '1';
          labels[`eyeL${personIdx}`] = eyeLabel;

          const jawLabel = labels[`jaw${personIdx}`] || createLabel("", pose[0].x*canvas.width - 40, pose[0].y*canvas.height + 30);
          jawLabel.textContent = `Jaw open: ${(jawOpen*100).toFixed(0)}%`;
          jawLabel.style.opacity = '1';
          labels[`jaw${personIdx}`] = jawLabel;
        }

        // Elbow angle example
        const elbowAngle = calculateAngle(pose[11], pose[13], pose[15]);
        const elbowLabel = labels[`elb${personIdx}`] || createLabel("", pose[13].x*canvas.width, pose[13].y*canvas.height);
        elbowLabel.textContent = `Elbow: ${elbowAngle.toFixed(0)}°`;
        elbowLabel.style.opacity = '1';
        labels[`elb${personIdx}`] = elbowLabel;

        // Neck tilt (rough)
        const neckTilt = Math.abs(pose[0].y - pose[1].y) * 100;
        const neckLabel = labels[`neck${personIdx}`] || createLabel("", pose[1].x*canvas.width, pose[1].y*canvas.height - 20);
        neckLabel.textContent = `Neck tilt: ${neckTilt.toFixed(0)}`;
        neckLabel.style.opacity = '1';
        labels[`neck${personIdx}`] = neckLabel;
      });
    }

    lastVideoTime = video.currentTime;
  }

  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

function createLabel(text, x, y, color = '#0ff') {
  const div = document.createElement('div');
  div.className = 'label';
  div.style.left = `${x}px`;
  div.style.top = `${y}px`;
  div.style.color = color;
  div.textContent = text;
  document.getElementById('container').appendChild(div);
  return div;
}

// ============== START ==============
async function start() {
  video = document.getElementById('video');
  await initMediaPipe();
  initThree();

  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
  video.srcObject = stream;
  await video.play();

  loop();
}

start().catch(console.error);

window.addEventListener('resize', () => {
  if (renderer) {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  }
});
</script>
</body>
</html>
